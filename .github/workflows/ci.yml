name: conda-build

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main


jobs:
  tests:
    runs-on: ${{ matrix.os }}
    strategy:
      # one failing job shouldn't cancel the rest of the matrix
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
        # quoted as strings (bare 3.10 would parse as float 3.1)
        python-version: ["3.12", "3.13", "3.14"]
    steps:
    - uses: actions/checkout@v7
      with:
        fetch-depth: 0
    - name: Cache conda
      uses: actions/cache@v6
      env:
        CACHE_NUMBER: 0
      with:
        path: ~/conda_pkgs_dir
        key:
          ${{ runner.os }}-${{ matrix.python-version }}-conda-${{ env.CACHE_NUMBER }}-${{ hashFiles('environment.yml') }}
    - uses: conda-incubator/setup-miniconda@v4
      with:
        auto-update-conda: true
        miniforge-version: latest
        environment-file: environment.yml
        python-version: ${{ matrix.python-version }}
        auto-activate-base: false
        use-only-tar-bz2: true
        activate-environment: qe
    - name: Conda info
      shell: bash -l {0}
      run: |
        conda info
        conda list
    - name: flake8 Tests
      shell: bash -l {0}
      run: |
        flake8 --select=F401,F405,E231 quantecon
    - name: Run Tests (pytest)
      shell: bash -l {0}
      run: |
        coverage run -m pytest quantecon
        coverage lcov
    - name: Coveralls
      uses: coverallsapp/github-action@v2
      # upload from one Linux job only (avoids the Coveralls parallel-build 422
      # race); continue-on-error so an upload hiccup can't fail CI
      if: runner.os == 'Linux' && matrix.python-version == '3.13'
      continue-on-error: true
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}
        # `file` (not the deprecated `path-to-lcov`) is the v2 input
        file: coverage.lcov
        format: lcov

  docs:

    name: Build docs
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v7
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        # mirrors the Read the Docs build (see .readthedocs.yaml)
        python-version: "3.14"
    - name: Install dependencies
      run: |
        pip install -r docs/rtd-requirements.txt
        pip install .
    - name: Check generated sources are up to date
      # Read the Docs builds the *committed* .rst files and never runs
      # qe_apidoc.py, so regenerating here would pass green while RTD
      # served stale pages. Fail if the committed sources have drifted.
      working-directory: docs
      run: python qe_apidoc.py
    - name: Fail on docs/source drift
      run: |
        git diff --exit-code -- docs/source \
          || { echo "::error::docs/source is stale -- run 'cd docs && python qe_apidoc.py' and commit the result"; exit 1; }
    - name: Build HTML
      working-directory: docs
      run: sphinx-build -b html --keep-going source build/html

  publish:

    name: Publish to PyPi
    needs: [tests]
    if: github.event_name == 'push' && startsWith(github.event.ref, 'refs/tags')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v7
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"
      - name: Install flit
        run: |
          pip install flit~=3.6
      - name: Build and publish
        run: |
          flit publish
        env:
          FLIT_USERNAME: __token__
          FLIT_PASSWORD: ${{ secrets.PYPI_TOKEN }}
