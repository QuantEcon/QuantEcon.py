name: conda-build

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main


jobs:
  tests:
    runs-on: ${{ matrix.os }}
    strategy:
      # Don't let one job's failure (e.g. a flaky timing test or a transient
      # coverage-upload error) cancel the rest of the matrix.
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
        python-version: [3.12, 3.13, 3.14]
    steps:
    - uses: actions/checkout@v7
      with:
        fetch-depth: 0
    - name: Cache conda
      uses: actions/cache@v5
      env:
        CACHE_NUMBER: 0
      with:
        path: ~/conda_pkgs_dir
        key:
          ${{ runner.os }}-${{ matrix.python-version }}-conda-${{ env.CACHE_NUMBER }}-${{ hashFiles('environment.yml') }}
    - uses: conda-incubator/setup-miniconda@v4
      with:
        auto-update-conda: true
        miniforge-version: latest
        environment-file: environment.yml
        python-version: ${{ matrix.python-version }}
        auto-activate-base: false
        use-only-tar-bz2: true
        activate-environment: qe
    - name: Conda info
      shell: bash -l {0}
      run: |
        conda info
        conda list
    - name: flake8 Tests
      shell: bash -l {0}
      run: |
        flake8 --select F401, F405, E231 quantecon
    - name: Run Tests (pytest)
      shell: bash -l {0}
      run: |
        coverage run -m pytest quantecon
        coverage lcov
    - name: Coveralls
      uses: coverallsapp/github-action@master
      # Upload coverage from a single Linux job only. When several jobs report
      # to the same Coveralls build without parallel coordination, whichever
      # job finishes after the build is closed gets a 422 ("Build is already
      # closed") and fails. ``continue-on-error`` additionally keeps a Coveralls
      # outage from blocking a merge.
      if: runner.os == 'Linux' && matrix.python-version == '3.13'
      continue-on-error: true
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}
        path-to-lcov: coverage.lcov

  publish:

    name: Publish to PyPi
    needs: [tests]
    if: github.event_name == 'push' && startsWith(github.event.ref, 'refs/tags')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v7
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"
      - name: Install flit
        run: |
          pip install flit~=3.6
      - name: Build and publish
        run: |
          flit publish
        env:
          FLIT_USERNAME: __token__
          FLIT_PASSWORD: ${{ secrets.PYPI_TOKEN }}
